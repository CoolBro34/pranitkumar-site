name: Deploy to GitHub Pages

on:
  push:
    branches: [main]       # runs on every push to main
  workflow_dispatch:        # also lets you trigger it manually from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; any in-progress run is cancelled
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .           # uploads the entire repo root — change to ./src or ./public if needed

      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
