<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery | Pranit Kumar</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="overlay"></div>

<div class="gallery-layout">
  <header class="gallery-header">
    <a href="index.html" class="back">← Back</a>
    <h1>Gallery</h1>
  </header>

  <main class="grid" id="grid"></main>

  <footer class="gallery-footer">
    © <span id="year"></span> Pranit Kumar
  </footer>
</div>

<script>
  const imageToPixelArray = (src, sampleSize = 24) => new Promise((resolve, reject) => {
    const image = new Image();
    image.src = src;

    image.onload = () => {
      const canvas = document.createElement('canvas');
      const context = canvas.getContext('2d', { willReadFrequently: true });
      const scale = Math.min(sampleSize / image.width, sampleSize / image.height, 1);
      const width = Math.max(1, Math.floor(image.width * scale));
      const height = Math.max(1, Math.floor(image.height * scale));

      canvas.width = width;
      canvas.height = height;
      context.drawImage(image, 0, 0, width, height);

      const data = context.getImageData(0, 0, width, height).data;
      const pixels = [];

      for (let y = 0; y < height; y += 1) {
        const row = [];
        for (let x = 0; x < width; x += 1) {
          const index = (y * width + x) * 4;
          row.push([data[index], data[index + 1], data[index + 2], data[index + 3]]);
        }
        pixels.push(row);
      }

      resolve({ src, width, height, pixels });
    };

    image.onerror = () => reject(new Error(`Failed to load image: ${src}`));
  });

  fetch('images.json')
    .then(response => response.json())
    .then(async images => {
      const grid = document.getElementById('grid');
      const pixelArrays = await Promise.all(images.map(src => imageToPixelArray(src)));

      pixelArrays.forEach(pixelData => {
        const wrapper = document.createElement('div');
        wrapper.className = 'grid-item';

        const output = document.createElement('pre');
        output.className = 'pixel-output';
        output.textContent = JSON.stringify(pixelData, null, 2);

        const blocker = document.createElement('div');
        blocker.className = 'blocker';

        wrapper.appendChild(output);
        wrapper.appendChild(blocker);
        grid.appendChild(wrapper);
      });
    })
    .catch(error => {
      document.getElementById('grid').textContent = error.message;
    });

  document.getElementById('year').textContent = new Date().getFullYear();
</script>

</body>
</html>
