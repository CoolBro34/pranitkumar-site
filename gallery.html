  <script>
    // Override grid population to hide broken images cleanly
    const grid = document.getElementById('grid');
    if (grid) {
      fetch('gallery/manifest.json')
        .then(r => r.json())
        .then(images => {
          images.forEach(entry => {
            const filename = typeof entry === 'string' ? entry : entry.filename;
            if (!filename) return;

            const wrapper = document.createElement('figure');
            wrapper.className = 'grid-item';
            // Hide by default — only shown once image confirms it loaded
            wrapper.style.display = 'none';

            const img = document.createElement('img');
            img.className = 'gallery-image';
            img.src = filename.includes('/') ? filename : `gallery/${filename}`;

            // Use filename (without extension and path) as alt text
            const base = filename.split('/').pop().replace(/\.[^.]+$/, '').replace(/[_-]/g, ' ');
            img.alt = base;

            img.loading = 'lazy';

            // Only reveal the card once the image has actually loaded
            img.addEventListener('load', () => {
              wrapper.style.display = '';
            });

            // On error, leave display:none — card stays invisible
            img.addEventListener('error', () => {
              wrapper.remove();
            });

            if (typeof entry === 'object' && entry.caption) {
              const caption = document.createElement('figcaption');
              caption.textContent = entry.caption;
              wrapper.appendChild(caption);
            }

            wrapper.appendChild(img);
            grid.appendChild(wrapper);
          });
        })
        .catch(() => {
          grid.innerHTML = '<p style="font-family:\'IBM Plex Mono\',monospace;font-size:.78rem;color:var(--text-muted);">Unable to load gallery.</p>';
        });
    }
  </script>
