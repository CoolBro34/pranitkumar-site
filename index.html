<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pranit Kumar | Photography</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="overlay"></div>

<div class="layout">
  <aside>
    <h1>PRANIT<br>KUMAR</h1>
    <nav>
      <a href="gallery.html">GALLERY</a>
      <a href="#contact">CONTACT</a>
    </nav>
  </aside>

  <main>
    <section class="hero">
      <div class="hero-wrap">
        <pre id="hero-pixels" class="pixel-output" aria-label="Pixel array output"></pre>
        <div class="blocker"></div>
      </div>
      <div class="welcome">WELCOME</div>
    </section>


    <section id="contact" style="padding:4rem">
      <p>hello@pranitkumar.com</p>
    </section>

    <footer>© <span id="year"></span> Pranit Kumar</footer>
  </main>
</div>

<script>
  const heroPixels = document.getElementById('hero-pixels');

  const imageToPixelArray = (src, sampleSize = 32) => new Promise((resolve, reject) => {
    const image = new Image();
    image.src = src;

    image.onload = () => {
      const canvas = document.createElement('canvas');
      const context = canvas.getContext('2d', { willReadFrequently: true });
      const scale = Math.min(sampleSize / image.width, sampleSize / image.height, 1);
      const width = Math.max(1, Math.floor(image.width * scale));
      const height = Math.max(1, Math.floor(image.height * scale));

      canvas.width = width;
      canvas.height = height;
      context.drawImage(image, 0, 0, width, height);

      const data = context.getImageData(0, 0, width, height).data;
      const pixels = [];

      for (let y = 0; y < height; y += 1) {
        const row = [];
        for (let x = 0; x < width; x += 1) {
          const index = (y * width + x) * 4;
          row.push([data[index], data[index + 1], data[index + 2], data[index + 3]]);
        }
        pixels.push(row);
      }

      resolve({ width, height, pixels });
    };

    image.onerror = () => reject(new Error(`Failed to load image: ${src}`));
  });

  fetch('images.json')
    .then(r => r.json())
    .then(async images => {
      if (images.length === 0) {
        heroPixels.textContent = 'No images available.';
        return;
      }

      const pixelData = await imageToPixelArray(images[0]);
      heroPixels.textContent = JSON.stringify(pixelData, null, 2);
    })
    .catch(error => {
      heroPixels.textContent = error.message;
    });

  document.getElementById('year').textContent = new Date().getFullYear();
</script>

</body>
</html>
